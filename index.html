<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zomato - order food online</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <div class="logo">
            <img src="zomato.png" alt="">
        </div>
        <ul>
            <li>
                <a href="">Add restaurant</a>
                <a href="">Log in</a>
                <a href="">Sign up</a>
            </li>

        </ul>
    </header>
    <main>
        <section>
            <img src="zlogo.png" alt="">
            <p>Find the best restaurants, cafés and bars in India</p>
            <input placeholder="Search for your faviorite restaurant, cuisine or dish">
        </section>
        <section class="popular-restaurants">
        <h2>Popular Restaurants</h2>
        <div class="restaurant-grid">
            <div class="restaurant-card">
                <img src="restaurant2.jpg" alt="Restaurant 2">
                <p>Spicy Bites</p>
            </div>
            <div class="restaurant-card">
                <img src="restaurant3.jpg" alt="Restaurant 3">
                <p>Urban Eatery</p>
            </div>
            <div class="restaurant-card">
                <img src="restaurant4.jpg" alt="Restaurant 4">
                <p>The Curry House</p>
            </div>
        </div>
    </section>
    </main>

    <footer>
        copyright &copy; | All rights reserved
    </footer>
    <script src="script.js"></script>
</body>

</html>
